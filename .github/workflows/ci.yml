name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source/frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: source/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --run

      - name: Build production bundle
        run: npm run build

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: zjiaotong
          MYSQL_USER: zjiaotong_app
          MYSQL_PASSWORD: ci-password
          MYSQL_ROOT_PASSWORD: ci-root-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -pci-root-password"
          --health-interval=10s --health-timeout=5s --health-retries=10
    defaults:
      run:
        working-directory: source/backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: source/backend/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest

      - name: Validate Alembic migration on MySQL
        env:
          DATABASE_URL: mysql+pymysql://zjiaotong_app:ci-password@127.0.0.1:3306/zjiaotong
        run: |
          python -m alembic -c alembic.ini upgrade head
          python -m alembic -c alembic.ini current
