name: 缺陷报告
description: 报告可重复的功能、界面或文档问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。安全漏洞、密钥或个人信息泄露请勿在此公开，请改用 Security Advisory。

  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简洁说明哪里出现了问题，以及对使用造成的影响。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 从打开哪个页面开始，按顺序写出稳定复现问题的操作。
      placeholder: |
        1. 打开……
        2. 点击……
        3. 观察到……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      description: 正常情况下应当发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      description: 实际发生了什么？可附已脱敏截图或日志。
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本或提交
      description: 填写分支名、提交 SHA 或部署版本。
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 运行环境
      description: 操作系统、浏览器及版本；后端问题请补充 Python 与数据库版本。
      placeholder: Windows 11 / Chrome 138 / Node.js 20
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志与补充信息
      description: 只粘贴与问题直接相关且已脱敏的内容，不要提交 Token、密码或个人信息。

  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已确认内容不含密钥、数据库密码、联系方式或真实学习数据。
          required: true
        - label: 这不是需要私下披露的安全漏洞。
          required: true
