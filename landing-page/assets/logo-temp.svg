<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 40" width="240" height="40">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#26251e"/>
      <stop offset="100%" style="stop-color:#504f49"/>
    </linearGradient>
  </defs>
  <!-- 图标：书本+AI电路 -->
  <g transform="translate(5, 5)">
    <!-- 左书本 -->
    <path d="M15 8 L5 4 L5 32 L15 36 Z" fill="none" stroke="#26251e" stroke-width="2" stroke-linejoin="round"/>
    <!-- 右书本 -->
    <path d="M25 8 L35 4 L35 32 L25 36 Z" fill="none" stroke="#26251e" stroke-width="2" stroke-linejoin="round"/>
    <!-- AI芯片 -->
    <rect x="12" y="14" width="16" height="12" rx="2" fill="#26251e"/>
    <circle cx="20" cy="20" r="3" fill="#fcfaf8"/>
    <!-- 连接线 -->
    <line x1="20" y1="11" x2="20" y2="14" stroke="#26251e" stroke-width="1.5"/>
    <line x1="20" y1="26" x2="20" y2="29" stroke="#26251e" stroke-width="1.5"/>
    <line x1="9" y1="20" x2="12" y2="20" stroke="#26251e" stroke-width="1.5"/>
    <line x1="28" y1="20" x2="31" y2="20" stroke="#26251e" stroke-width="1.5"/>
    <!-- 装饰点 -->
    <circle cx="20" cy="8" r="2" fill="#26251e"/>
    <circle cx="20" cy="32" r="2" fill="#26251e"/>
    <circle cx="5" cy="20" r="2" fill="#26251e"/>
    <circle cx="35" cy="20" r="2" fill="#26251e"/>
  </g>
  <!-- 文字 -->
  <text x="50" y="28" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="600" fill="#26251e" letter-spacing="2">智教通</text>
</svg>
