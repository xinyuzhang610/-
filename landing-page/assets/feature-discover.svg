<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 573 360" width="573" height="360">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#efebe3"/>
      <stop offset="100%" style="stop-color:#f5ede7"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="573" height="360" fill="url(#bg1)"/>
  <!-- 放大镜图标 -->
  <g transform="translate(200, 100)">
    <circle cx="80" cy="80" r="60" fill="none" stroke="#26251e" stroke-width="4"/>
    <line x1="125" y1="125" x2="170" y2="170" stroke="#26251e" stroke-width="6" stroke-linecap="round"/>
    <!-- AI电路 -->
    <circle cx="80" cy="80" r="20" fill="#26251e" opacity="0.2"/>
    <circle cx="80" cy="80" r="8" fill="#26251e"/>
    <!-- 连接线 -->
    <line x1="88" y1="80" x2="120" y2="80" stroke="#26251e" stroke-width="2"/>
    <line x1="80" y1="72" x2="80" y2="40" stroke="#26251e" stroke-width="2"/>
    <line x1="80" y1="88" x2="80" y2="120" stroke="#26251e" stroke-width="2"/>
    <line x1="72" y1="80" x2="40" y2="80" stroke="#26251e" stroke-width="2"/>
  </g>
  <!-- 装饰元素 -->
  <circle cx="100" cy="50" r="15" fill="#26251e" opacity="0.1"/>
  <circle cx="450" cy="300" r="20" fill="#26251e" opacity="0.1"/>
  <rect x="450" y="80" width="80" height="60" rx="5" fill="#26251e" opacity="0.1"/>
</svg>
