<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 360" width="660" height="360">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5ede7"/>
      <stop offset="100%" style="stop-color:#fbf2e9"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="660" height="360" fill="url(#bg5)"/>
  <!-- 图表区域 -->
  <g transform="translate(80, 40)">
    <!-- 坐标轴 -->
    <line x1="50" y1="250" x2="500" y2="250" stroke="#26251e" stroke-width="2"/>
    <line x1="50" y1="250" x2="50" y2="30" stroke="#26251e" stroke-width="2"/>
    <!-- 柱状图 -->
    <rect x="80" y="150" width="60" height="100" fill="#26251e" opacity="0.3"/>
    <rect x="160" y="100" width="60" height="150" fill="#26251e" opacity="0.5"/>
    <rect x="240" y="80" width="60" height="170" fill="#26251e" opacity="0.7"/>
    <rect x="320" y="60" width="60" height="190" fill="#26251e" opacity="0.9"/>
    <rect x="400" y="40" width="60" height="210" fill="#26251e"/>
    <!-- 折线图 -->
    <polyline points="110,180 190,140 270,120 350,90 430,60"
              fill="none" stroke="#26251e" stroke-width="3" stroke-linecap="round"/>
    <circle cx="110" cy="180" r="6" fill="#26251e"/>
    <circle cx="190" cy="140" r="6" fill="#26251e"/>
    <circle cx="270" cy="120" r="6" fill="#26251e"/>
    <circle cx="350" cy="90" r="6" fill="#26251e"/>
    <circle cx="430" cy="60" r="6" fill="#26251e"/>
    <!-- 标签 -->
    <text x="110" y="270" text-anchor="middle" fill="#26251e" font-size="12" font-family="Arial">周一</text>
    <text x="190" y="270" text-anchor="middle" fill="#26251e" font-size="12" font-family="Arial">周二</text>
    <text x="270" y="270" text-anchor="middle" fill="#26251e" font-size="12" font-family="Arial">周三</text>
    <text x="350" y="270" text-anchor="middle" fill="#26251e" font-size="12" font-family="Arial">周四</text>
    <text x="430" y="270" text-anchor="middle" fill="#26251e" font-size="12" font-family="Arial">周五</text>
  </g>
  <!-- 装饰元素 -->
  <circle cx="600" cy="80" r="30" fill="#26251e" opacity="0.1"/>
  <circle cx="580" cy="300" r="20" fill="#26251e" opacity="0.1"/>
</svg>
