<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 573 360" width="573" height="360">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6f1ea"/>
      <stop offset="100%" style="stop-color:#efebe3"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="573" height="360" fill="url(#bg2)"/>
  <!-- AI代理图标组 -->
  <g transform="translate(150, 80)">
    <!-- 中央AI图标 -->
    <circle cx="130" cy="100" r="50" fill="#26251e" opacity="0.15"/>
    <circle cx="130" cy="100" r="30" fill="#26251e"/>
    <text x="130" y="108" text-anchor="middle" fill="white" font-size="24" font-family="Arial">AI</text>
    <!-- 周围的代理节点 -->
    <circle cx="30" cy="50" r="20" fill="#26251e" opacity="0.2"/>
    <circle cx="30" cy="50" r="10" fill="#26251e"/>
    <circle cx="230" cy="50" r="20" fill="#26251e" opacity="0.2"/>
    <circle cx="230" cy="50" r="10" fill="#26251e"/>
    <circle cx="30" cy="150" r="20" fill="#26251e" opacity="0.2"/>
    <circle cx="30" cy="150" r="10" fill="#26251e"/>
    <circle cx="230" cy="150" r="20" fill="#26251e" opacity="0.2"/>
    <circle cx="230" cy="150" r="10" fill="#26251e"/>
    <!-- 连接线 -->
    <line x1="50" y1="50" x2="100" y2="80" stroke="#26251e" stroke-width="2" opacity="0.5"/>
    <line x1="210" y1="50" x2="160" y2="80" stroke="#26251e" stroke-width="2" opacity="0.5"/>
    <line x1="50" y1="150" x2="100" y2="120" stroke="#26251e" stroke-width="2" opacity="0.5"/>
    <line x1="210" y1="150" x2="160" y2="120" stroke="#26251e" stroke-width="2" opacity="0.5"/>
  </g>
</svg>
