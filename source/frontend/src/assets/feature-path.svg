<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 573 360" width="573" height="360">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbf2e9"/>
      <stop offset="100%" style="stop-color:#efe8e3"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="573" height="360" fill="url(#bg4)"/>
  <!-- 路径线条 -->
  <g transform="translate(50, 50)">
    <!-- 曲线路径 -->
    <path d="M50 250 Q150 200 200 150 Q250 100 350 120 Q450 140 470 80"
          fill="none" stroke="#26251e" stroke-width="4" stroke-linecap="round"/>
    <!-- 路径节点 -->
    <circle cx="50" cy="250" r="15" fill="#26251e"/>
    <circle cx="200" cy="150" r="15" fill="#26251e"/>
    <circle cx="350" cy="120" r="15" fill="#26251e"/>
    <circle cx="470" cy="80" r="20" fill="#26251e"/>
    <!-- 节点标签 -->
    <text x="50" y="280" text-anchor="middle" fill="#26251e" font-size="12" font-family="Arial">起点</text>
    <text x="200" y="180" text-anchor="middle" fill="#26251e" font-size="12" font-family="Arial">学习</text>
    <text x="350" y="150" text-anchor="middle" fill="#26251e" font-size="12" font-family="Arial">成长</text>
    <text x="470" y="110" text-anchor="middle" fill="#26251e" font-size="12" font-family="Arial">目标</text>
    <!-- 装饰 -->
    <circle cx="120" cy="200" r="8" fill="#26251e" opacity="0.3"/>
    <circle cx="280" cy="130" r="8" fill="#26251e" opacity="0.3"/>
    <circle cx="410" cy="100" r="8" fill="#26251e" opacity="0.3"/>
  </g>
</svg>
