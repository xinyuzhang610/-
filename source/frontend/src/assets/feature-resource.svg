<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 573 360" width="573" height="360">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#efe8e3"/>
      <stop offset="100%" style="stop-color:#f6f1ea"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="573" height="360" fill="url(#bg3)"/>
  <!-- 书本堆叠 -->
  <g transform="translate(180, 60)">
    <!-- 底层书本 -->
    <rect x="0" y="180" width="200" height="30" rx="3" fill="#26251e" opacity="0.3"/>
    <rect x="10" y="150" width="180" height="30" rx="3" fill="#26251e" opacity="0.4"/>
    <rect x="20" y="120" width="160" height="30" rx="3" fill="#26251e" opacity="0.5"/>
    <rect x="30" y="90" width="140" height="30" rx="3" fill="#26251e" opacity="0.6"/>
    <rect x="40" y="60" width="120" height="30" rx="3" fill="#26251e" opacity="0.7"/>
    <rect x="50" y="30" width="100" height="30" rx="3" fill="#26251e" opacity="0.8"/>
    <rect x="60" y="0" width="80" height="30" rx="3" fill="#26251e"/>
    <!-- 装饰圆点 -->
    <circle cx="100" cy="15" r="5" fill="white"/>
    <circle cx="100" cy="105" r="5" fill="white"/>
  </g>
  <!-- 浮动元素 -->
  <circle cx="100" cy="100" r="25" fill="#26251e" opacity="0.1"/>
  <circle cx="450" cy="250" r="30" fill="#26251e" opacity="0.1"/>
</svg>
